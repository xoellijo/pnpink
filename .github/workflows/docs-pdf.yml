name: docs-pdf

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "mkdocs.pdf.yml"
      - "hooks/**"
      - ".github/workflows/docs-pdf.yml"

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system libraries for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libcairo2 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements-pdf.txt

      - name: Build docs with PDF
        run: mkdocs build -f mkdocs.pdf.yml --strict

      - name: Verify PDF output
        run: |
          ls -la .artifacts || true
          test -f .artifacts/pnpink.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pnpink-docs-pdf
          path: .artifacts/pnpink.pdf
          if-no-files-found: error
